name: gtd-dispatcher
description: |
  Classify a GTD request via Ollama, then invoke the matching sub-workflow.
  Demonstrates type:invoke with a template expression in the workflow: field
  (dispatcher pattern). Replaces the monolithic gtd-handler pipeline.
priority: 10
trigger:
  source: discord
  slash_command: gtd
  classifier: ollama
  model: qwen2.5:7b
  intents:
    - gtd_show_today
    - gtd_show_inbox
    - gtd_add_inbox
  prompt: |
    Classify this GTD task management request from a /gtd slash command.

    Intents:
    - gtd_show_today: User wants to see today's tasks (e.g., "today", "what's on my list", "tasks", "show", "list")
    - gtd_show_inbox: User wants to see inbox items (e.g., "inbox", "what's waiting", "captured", "unsorted")
    - gtd_add_inbox: User wants to add an item to inbox (e.g., "add buy milk", "capture call doctor", "remember to...")

    Answer with ONE intent name only, no explanation.

# Workflow-level params declaration
params:
  content:
    type: string
    description: The user's message content
    required: false

pipeline:
  # Step 1: Invoke the sub-workflow named after the classified intent.
  # {{intent}} is set by the Ollama classifier; if the sub-workflow doesn't
  # exist, escalate to the executive rather than failing silently.
  - type: invoke
    workflow: "{{intent}}"
    on_missing: escalate
    output: response

  # Step 2: Reply with the sub-workflow's output.
  - action: reply
    message: "{{response}}"
